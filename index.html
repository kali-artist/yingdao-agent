<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI数字人助手</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Live2D Cubism 4 Core -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <!-- PIXI.js 6.x -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <!-- pixi-live2d-display (cubism4 build) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>
  <!-- 动态渐变光晕背景 -->
  <div class="aurora-bg">
    <div class="aurora-blob blob-1"></div>
    <div class="aurora-blob blob-2"></div>
    <div class="aurora-blob blob-3"></div>
  </div>
  <!-- 粒子层 -->
  <canvas id="bg-canvas"></canvas>
  <!-- 噪点纹理 -->
  <div class="noise-overlay"></div>

  <div id="app">
    <!-- Live2D 角色区域 -->
    <div id="live2d-wrapper">
      <!-- 顶部标签 -->
      <div class="char-tag">
        <span class="char-tag-dot"></span>
        <span class="char-tag-text">AI 数字人 · 在线</span>
      </div>
      <canvas id="live2d-canvas"></canvas>
      <div id="live2d-loading">
        <div class="loader-ring"></div>
        <p>数字人加载中...</p>
      </div>
      <!-- 底部光带反射 -->
      <div class="stage-reflection"></div>
    </div>

    <!-- 聊天面板 -->
    <div id="chat-panel" class="glass">
      <div id="chat-header">
        <div class="header-left">
          <div class="avatar-mini">
            <div class="avatar-pulse"></div>
          </div>
          <div class="header-info">
            <h1>AI数字人助手</h1>
            <div id="status-bar">
              <span class="status-dot" id="status-dot"></span>
              <span id="status-text">就绪</span>
              <span class="msg-counter" id="msg-counter">0 条对话</span>
            </div>
          </div>
        </div>
        <button id="clear-btn" title="清空对话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div id="chat-messages">
        <div class="message assistant">
          <div class="message-avatar">AI</div>
          <div class="message-content">你好！我是你的AI数字人助手，有什么可以帮你的吗？😊</div>
        </div>
      </div>

      <!-- 文件预览区 -->
      <div id="file-preview-area"></div>

      <div id="chat-input-area">
        <div id="typing-indicator" style="display:none">
          <span></span><span></span><span></span>
        </div>
        <div class="input-wrapper">
          <button id="file-btn" title="发送文件" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <input type="text" id="chat-input" placeholder="输入消息..." autocomplete="off" disabled>
          <button id="send-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <input type="file" id="file-input" multiple hidden>
      </div>
    </div>
  </div>

  <script src="js/bg-particles.js"></script>
  <script src="js/live2d.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
