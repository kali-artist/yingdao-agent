<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI数字人助手</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Live2D Cubism 4 Core -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <!-- PIXI.js 6.x (required by pixi-live2d-display) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <!-- pixi-live2d-display -->
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 背景粒子 -->
    <canvas id="bg-canvas"></canvas>
    
    <!-- Live2D 角色区域 -->
    <div id="live2d-wrapper">
      <canvas id="live2d-canvas"></canvas>
      <div id="live2d-loading">
        <div class="loader-ring"></div>
        <p>数字人加载中...</p>
      </div>
    </div>

    <!-- 聊天面板 -->
    <div id="chat-panel" class="glass">
      <div id="chat-header">
        <div class="header-left">
          <div class="avatar-mini"></div>
          <div class="header-info">
            <h1>AI数字人助手</h1>
            <div id="status-bar">
              <span class="status-dot" id="status-dot"></span>
              <span id="status-text">就绪</span>
            </div>
          </div>
        </div>
        <button id="clear-btn" title="清空对话">🗑</button>
      </div>

      <div id="chat-messages">
        <div class="message assistant">
          <div class="message-content">你好！我是你的AI数字人助手，有什么可以帮你的吗？😊</div>
        </div>
      </div>

      <div id="chat-input-area">
        <div id="typing-indicator" style="display:none">
          <span></span><span></span><span></span>
        </div>
        <div class="input-wrapper">
          <input type="text" id="chat-input" placeholder="输入消息..." autocomplete="off" disabled>
          <button id="send-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="modal" style="display:none">
      <div class="modal-content glass">
        <h2>设置</h2>
        <div class="setting-item">
          <label>API地址</label>
          <input type="text" id="api-url-input" placeholder="https://...">
        </div>
        <div class="setting-item">
          <label>API Key</label>
          <input type="password" id="api-key-input" placeholder="可选">
        </div>
        <div class="setting-item">
          <label>系统提示词</label>
          <textarea id="system-prompt-input" rows="3" placeholder="你是一个友好的AI助手..."></textarea>
        </div>
        <div class="modal-actions">
          <button id="settings-save">保存</button>
          <button id="settings-close">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/bg-particles.js"></script>
  <script src="js/live2d.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
