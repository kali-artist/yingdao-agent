<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>需需 · AI助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
</head>
<body>
  <!-- 赛博网格背景 -->
  <div class="grid-bg"></div>

  <!-- 多层背景 -->
  <div class="bg-layer">
    <img src="assets/bg-atmospheric.png" alt="" class="bg-image">
    <div class="bg-overlay"></div>
    <div class="bg-vignette"></div>
  </div>
  <canvas id="bg-canvas"></canvas>
  <div class="noise-overlay"></div>

  <!-- CRT扫描线纹理 -->
  <div class="crt-lines"></div>

  <!-- 移动扫描线 -->
  <div class="scanline"></div>

  <!-- 鼠标光晕 -->
  <div class="cursor-glow" id="cursor-glow"></div>

  <div id="app">
    <!-- 左侧角色展示区 -->
    <div id="stage">
      <!-- HUD角标 -->
      <div class="hud-corner tl"></div>
      <div class="hud-corner tr"></div>
      <div class="hud-corner bl"></div>
      <div class="hud-corner br"></div>

      <!-- 顶部状态栏 -->
      <div class="stage-topbar">
        <div class="brand">
          <div class="brand-mark"></div>
          <span class="brand-name" data-text="需需 · AI">需需 · AI</span>
        </div>
        <div class="stage-status">
          <span class="pill pill-live"><span class="pill-dot"></span>SYSTEM ONLINE</span>
        </div>
      </div>

      <!-- 竖排装饰文字 -->
      <div class="vert-text">DIGITAL HUMAN · INTERACTIVE ASSISTANT</div>

      <!-- 数据流装饰 -->
      <div class="data-stream data-stream-1"></div>
      <div class="data-stream data-stream-2"></div>

      <!-- Live2D 画布 -->
      <div id="live2d-wrapper">
        <canvas id="live2d-canvas"></canvas>
        <div id="live2d-loading">
          <div class="loader-ring"></div>
          <p>LOADING...</p>
        </div>
      </div>

      <!-- 底部光晕反射 -->
      <div class="stage-glow"></div>

      <!-- 底部状态药丸 -->
      <div class="stage-bottombar">
        <span class="pill pill-green"><span class="pill-dot"></span>AI ACTIVE</span>
        <span class="pill pill-amber"><span class="pill-dot"></span>READY</span>
        <span class="pill pill-purple"><span class="pill-dot"></span>v2026</span>
      </div>
    </div>

    <!-- 可拖拽分隔条 -->
    <div id="panel-splitter">
      <div class="splitter-handle"></div>
    </div>

    <!-- 右侧聊天面板 -->
    <div id="chat-panel">
      <div id="chat-header">
        <div class="header-left">
          <div class="header-avatar">
            <div class="header-avatar-inner">AI</div>
            <div class="avatar-pulse"></div>
            <div class="avatar-pulse"></div>
          </div>
          <div class="header-info">
            <h1>需需</h1>
            <div id="status-bar">
              <span class="status-dot" id="status-dot"></span>
              <span id="status-text">就绪</span>
              <span class="msg-counter" id="msg-counter">0 条对话</span>
            </div>
          </div>
        </div>
        <button id="clear-btn" title="清空对话">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div id="chat-messages">
        <div class="message assistant">
          <div class="message-avatar">AI</div>
          <div class="message-content">你好！我是需需，你的AI助手，有什么可以帮你的吗？😊</div>
        </div>
      </div>

      <div id="file-preview-area"></div>

      <div id="chat-input-area">
        <div id="typing-indicator" style="display:none">
          <span></span><span></span><span></span>
        </div>
        <div class="input-wrapper">
          <button id="file-btn" title="发送文件" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <input type="text" id="chat-input" placeholder="输入消息..." autocomplete="off" disabled>
          <button id="send-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <input type="file" id="file-input" multiple hidden>
      </div>
    </div>
  </div>

  <script src="js/bg-particles.js?v=20260703d"></script>
  <script src="js/live2d.js?v=20260703d"></script>
  <script src="js/chat.js?v=20260703d"></script>
  <script src="js/app.js?v=20260703d"></script>
</body>
</html>
